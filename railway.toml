[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand    = "sh -c 'cd /app/apps/server && pnpm exec prisma db push && node --import tsx/esm /app/apps/server/src/index.ts'"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
