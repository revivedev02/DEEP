appId:       com.deep.app
productName: DEEP
copyright:   Copyright © 2026 DEEP

# ── Directories ───────────────────────────────────────────────────────────────
directories:
  output:         release/
  buildResources: assets/

# ── What to pack ─────────────────────────────────────────────────────────────
files:
  - dist/**/*        # Compiled main + preload
  - assets/**/*      # App icons

# ── Publish (GitHub Releases for auto-updater) ────────────────────────────────
publish:
  - provider: github
    owner:    revivedev02
    repo:     DEEP

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon:   assets/icons/win/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick:                            false
  perMachine:                          false
  allowToChangeInstallationDirectory:  true
  createDesktopShortcut:               true
  createStartMenuShortcut:             true
  shortcutName:                        DEEP
  deleteAppDataOnUninstall:            false

  # Custom branded bitmaps (solid-color, no artwork — generated by prebuild script)
  installerHeader:  installer/header.bmp     # 150×57 dark espresso gradient
  installerSidebar: installer/sidebar.bmp    # 164×314 pure ember dark

  # NSIS script for text colors and finishing touches
  include: installer/custom.nsh

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  icon:   assets/icons/mac/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.social-networking

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon:   assets/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Network
