appId:       com.deep.app
productName: DEEP
copyright:   Copyright © 2026 DEEP

directories:
  output:         release/
  buildResources: assets/

files:
  - dist/**/*
  - assets/**/*

publish:
  - provider:     github
    owner:        revivedev02
    repo:         DEEP
    releaseType:  release    # publish immediately, not as a draft

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon:   assets/icons/win/icon.ico
  target:
    - target: nsis
      arch: [x64]

nsis:
  artifactName:                       DEEP-Setup.exe
  oneClick:                           false
  perMachine:                         false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut:              true
  createStartMenuShortcut:            true
  shortcutName:                       DEEP
  deleteAppDataOnUninstall:           false
  installerHeader:  installer/header.bmp
  installerSidebar: installer/sidebar.bmp
  include:          installer/custom.nsh
