appId:       com.deep.app
productName: DEEP
copyright:   Copyright © 2026 DEEP

directories:
  output:         release/
  buildResources: assets/

files:
  - dist/**/*
  - assets/**/*

publish:
  - provider: github
    owner:    revivedev02
    repo:     DEEP

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon:         assets/icons/win/icon.ico
  artifactName: DEEP-Setup.exe   # Stable name — URL never breaks on version bump
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick:                           false
  perMachine:                         false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut:              true
  createStartMenuShortcut:            true
  shortcutName:                       DEEP
  deleteAppDataOnUninstall:           false
  installerHeader:  installer/header.bmp
  installerSidebar: installer/sidebar.bmp
  include:          installer/custom.nsh
